function LoginScreen({onLogin,t,darkMode,toggleDark}) {
  const [loading,setLoading]   = React.useState(false);
  const [email,setEmail]       = React.useState("");
  const [pass,setPass]         = React.useState("");
  const [nombre,setNombre]     = React.useState("");
  const [empresa,setEmpresa]   = React.useState("");
  const [error,setError]       = React.useState("");
  const [vista,setVista]       = React.useState("login");

  const handleLogin = async () => {
    setError(""); setLoading(true);
    const {error:err} = await supabase.auth.signInWithPassword({email,password:pass});
    setLoading(false);
    if(err) { setError("Email o contraseña incorrectos"); return; }
    onLogin();
  };

  const handleRegistro = async () => {
    setError(""); setLoading(true);
    const {error:err} = await supabase.auth.signUp({
      email, password:pass,
      options:{ data:{ nombre, empresa } }
    });
    setLoading(false);
    if(err) { setError(err.message); return; }
    setError(""); setVista("verificar");
  };

  if(vista==="verificar") return (
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420,textAlign:"center"}}>
        <div style={{width:72,height:72,borderRadius:"50%",background:"#10B98118",border:"2px solid #10B981",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 20px"}}>📬</div>
        <h2 style={{fontFamily:"'Sora',sans-serif",fontSize:22,fontWeight:800,color:t.text,marginBottom:10}}>Revisa tu email</h2>
        <p style={{fontSize:14,color:t.textSub,marginBottom:6}}>Te enviamos un link de confirmación a:</p>
        <p style={{fontSize:14,fontWeight:700,color:t.blue,marginBottom:24}}>{email}</p>
        <p style={{fontSize:12,color:t.textMuted,marginBottom:20}}>Confirma tu cuenta y luego vuelve aquí para ingresar.</p>
        <button onClick={()=>setVista("login")} style={{background:`linear-gradient(135deg,${t.blue},${t.blueDark})`,border:"none",borderRadius:14,padding:"13px 32px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>Ir a Ingresar →</button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20,
      backgroundImage:darkMode?"radial-gradient(ellipse at 20% 50%,#1e3a5f22 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#1e40af18 0%,transparent 50%)":"radial-gradient(ellipse at 20% 50%,#dbeafe 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#bfdbfe 0%,transparent 50%)"}}>
      <div style={{width:"100%",maxWidth:420}}>

        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:14,filter:`drop-shadow(0 8px 24px #3B82F644)`}}>
            <LogoIcon size={64}/>
          </div>
          <h1 style={{fontFamily:"'Sora',sans-serif",fontSize:28,fontWeight:800,color:t.text,letterSpacing:"-0.5px",margin:0}}>
            Obra<span style={{color:t.blue}}>Clara</span>
          </h1>
          <p style={{fontSize:13,color:t.textSub,marginTop:6}}>Control de obras inteligente</p>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",background:t.bgCard,borderRadius:16,padding:5,marginBottom:20,border:`1px solid ${t.border}`}}>
          {[{id:"login",label:"Ingresar"},{id:"registro",label:"Crear cuenta"}].map(tab=>(
            <button key={tab.id} onClick={()=>{setVista(tab.id);setError("");}}
              style={{flex:1,padding:"10px",borderRadius:12,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all 0.2s",
                background:vista===tab.id?`linear-gradient(135deg,${t.blue},${t.blueDark})`:"transparent",

                boxShadow:vista===tab.id?`0 4px 12px ${t.blue}44`:"none"}}>
              {tab.label}
            </button>
          ))}
        </div>

        {/* Card */}
        <div style={{background:t.bgCard,borderRadius:24,padding:28,border:`1px solid ${t.border}`,boxShadow:t.shadow}}>

          {/* Error */}
          {error&&(
            <div style={{background:"#EF444418",border:"1px solid #EF444433",borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",gap:8,alignItems:"center"}}>
              <span>⚠️</span>
              <p style={{fontSize:12,color:"#EF4444",margin:0,fontWeight:600}}>{error}</p>

          {vista==="login" ? (
            <>
              <h2 style={{fontSize:17,fontWeight:700,color:t.text,marginBottom:4,fontFamily:"'Sora',sans-serif"}}>Bienvenido de vuelta</h2>
              <p style={{fontSize:13,color:t.textSub,marginBottom:22}}>Ingresa a tu cuenta para continuar</p>
              <div style={{marginBottom:14}}>
                <label style={{fontSize:11,fontWeight:600,color:t.textSub,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Email</label>
                <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="tuemail@tumail.cl"
                  onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                  style={{width:"100%",padding:"12px 14px",background:t.inputBg,border:`1.5px solid ${t.border}`,borderRadius:12,color:t.text,fontSize:14,outline:"none",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",transition:"border 0.2s"}}
                  onFocus={e=>e.target.style.border=`1.5px solid ${t.blue}`}
                  onBlur={e=>e.target.style.border=`1.5px solid ${t.border}`}/>
              </div>
              <div style={{marginBottom:22}}>
                <label style={{fontSize:11,fontWeight:600,color:t.textSub,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Contraseña</label>
                <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
                  onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                  style={{width:"100%",padding:"12px 14px",background:t.inputBg,border:`1.5px solid ${t.border}`,borderRadius:12,color:t.text,fontSize:14,outline:"none",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",transition:"border 0.2s"}}
                  onFocus={e=>e.target.style.border=`1.5px solid ${t.blue}`}
                  onBlur={e=>e.target.style.border=`1.5px solid ${t.border}`}/>
                <div style={{textAlign:"right",marginTop:6}}>
                  <span style={{fontSize:12,color:t.blue,cursor:"pointer"}}>¿Olvidaste tu contraseña?</span>
                </div>
              </div>
              <button onClick={handleLogin} disabled={loading}
                style={{width:"100%",padding:"14px",background:loading?t.border:`linear-gradient(135deg,${t.blue},${t.blueDark})`,border:"none",borderRadius:14,color:"#fff",fontSize:15,fontWeight:700,cursor:loading?"default":"pointer",fontFamily:"'Sora',sans-serif",boxShadow:loading?"none":`0 4px 20px ${t.blue}44`,transition:"all 0.2s"}}>
                {loading?"⏳ Ingresando...":"Ingresar →"}
              </button>
            </>
          ) : (
            <>
              <h2 style={{fontSize:17,fontWeight:700,color:t.text,marginBottom:4,fontFamily:"'Sora',sans-serif"}}>Crea tu cuenta gratis</h2>
              <p style={{fontSize:13,color:t.textMuted,marginBottom:22}}>1 mes gratis · Sin tarjeta de crédito</p>
              {[
                {label:"Nombre completo",      placeholder:"Juan Pérez",          type:"text",    val:nombre,  set:setNombre},
                {label:"Email",                placeholder:"tuemail@tumail.cl",   type:"email",   val:email,   set:setEmail},
                {label:"Empresa / Constructora",placeholder:"Constructora XYZ",  type:"text",    val:empresa, set:setEmpresa},
                {label:"Contraseña",           placeholder:"Mínimo 8 caracteres", type:"password",val:pass,    set:setPass},
              ].map((f,i)=>(
                <div key={i} style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:600,color:t.textSub,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{f.label}</label>
                  <input type={f.type} placeholder={f.placeholder} value={f.val} onChange={e=>f.set(e.target.value)}
                    style={{width:"100%",padding:"12px 14px",background:t.inputBg,border:`1.5px solid ${t.border}`,borderRadius:12,color:t.text,fontSize:14,outline:"none",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",transition:"border 0.2s"}}
                    onFocus={e=>e.target.style.border=`1.5px solid ${t.blue}`}
                    onBlur={e=>e.target.style.border=`1.5px solid ${t.border}`}/>
                </div>
              ))}
              <button onClick={handleRegistro} disabled={loading}
                style={{width:"100%",padding:"14px",background:loading?t.border:`linear-gradient(135deg,${t.green},#059669)`,border:"none",borderRadius:14,color:"#fff",fontSize:15,fontWeight:700,cursor:loading?"default":"pointer",fontFamily:"'Sora',sans-serif",boxShadow:loading?"none":`0 4px 20px ${t.green}44`,transition:"all 0.2s",marginTop:4}}>
                {loading?"⏳ Creando cuenta...":"Crear cuenta gratis →"}
              </button>
              <p style={{textAlign:"center",fontSize:11,color:t.textMuted,marginTop:14}}>
                Al registrarte aceptas los <span style={{color:t.blue,cursor:"pointer"}}>Términos de uso</span>
              </p>
            </>
          )}
        </div>

        {/* Toggle día/noche */}
        <div style={{textAlign:"center",marginTop:18}}>
          <button onClick={toggleDark} style={{background:"none",border:`1px solid ${t.border}`,borderRadius:20,padding:"7px 18px",color:t.textSub,fontSize:12,cursor:"pointer",transition:"all 0.2s"}}
            onMouseEnter={e=>e.target.style.borderColor=t.blue}
            onMouseLeave={e=>e.target.style.borderColor=t.border}>
            {darkMode?"☀️ Modo día":"🌙 Modo noche"}
          </button>
        </div>
      </div>
    </div>
  );
}

function getPMColor(real,plan,t){
  const d=plan-real;
  if(d<=5)  return {color:t.green, icon:"●", bg:t.green+"18",  border:t.green+"33"};
  if(d<=15) return {color:t.yellow,icon:"◐", bg:t.yellow+"18", border:t.yellow+"33"};
  return          {color:t.red,   icon:"○", bg:t.red+"18",    border:t.red+"33"};
}

function PersonalSelector({t}) {
  const AYER = 14; // precargado del día anterior
  const [n, setN] = React.useState(AYER);
  const inc = () => setN(v => v+1);
  const dec = () => setN(v => Math.max(1,v-1));
  const handleInput = (v) => { const p=parseInt(v); if(!isNaN(p)&&p>0) setN(p); };
  const cambio = n - AYER;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <button className="mob-btn" onClick={dec}
          style={{width:48,height:48,borderRadius:14,background:t.bgCard2,border:`1px solid ${t.border}`,fontSize:22,fontWeight:700,color:t.textSub,cursor:"pointer",flexShrink:0}}>−</button>
        <div style={{flex:1,textAlign:"center"}}>
          <input type="number" value={n} onChange={e=>handleInput(e.target.value)} min={1}
            style={{width:"100%",background:"transparent",border:"none",color:t.text,
              fontSize:40,fontWeight:800,textAlign:"center",
              fontFamily:"'Sora',sans-serif",outline:"none"}}/>
          <p style={{fontSize:11,color:t.textMuted,margin:0}}>personas en obra hoy</p>
        </div>
        <button className="mob-btn" onClick={inc}
          style={{width:48,height:48,borderRadius:14,background:t.bgCard2,border:`1px solid ${t.border}`,fontSize:22,fontWeight:700,color:t.textSub,cursor:"pointer",flexShrink:0}}>+</button>
      </div>
      <div style={{marginTop:12,textAlign:"center"}}>
        {cambio===0
          ? <span style={{fontSize:11,color:t.textMuted}}>Igual que ayer ({AYER} personas)</span>
          : <span style={{fontSize:11,fontWeight:700,color:cambio>0?t.green:t.yellow}}>
              {cambio>0?`+${cambio}`:`${cambio}`} respecto a ayer · ayer fueron {AYER}
            </span>
        }
      </div>
    </div>
  );
}

function FotoRapidaModal({t,onClose,onEnviar}) {
  const emojis = ["🏗️","⚙️","🔨","🧱","⚡","🔧","🪵","🪣","🔩","🪜"];
  const [paso,setPaso] = React.useState("elegir"); // "elegir" | "camara" | "galeria" | "confirmar"
  const [fotos,setFotos] = React.useState([]);
  const [descComun,setDescComun] = React.useState("");
  const hora = new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"});

  // Simula selección múltiple de galería
  const GALERIA_DEMO = [
    {id:1,emoji:"🏗️",nombre:"IMG_4521.jpg"},
    {id:2,emoji:"⚙️",nombre:"IMG_4522.jpg"},
    {id:3,emoji:"🔨",nombre:"IMG_4523.jpg"},
    {id:4,emoji:"🧱",nombre:"IMG_4524.jpg"},
    {id:5,emoji:"⚡",nombre:"IMG_4525.jpg"},
    {id:6,emoji:"🔧",nombre:"IMG_4526.jpg"},
    {id:7,emoji:"🪵",nombre:"IMG_4527.jpg"},
    {id:8,emoji:"🪣",nombre:"IMG_4528.jpg"},
  ];
  const [seleccionadas,setSeleccionadas] = React.useState([]);

  const toggleSeleccion = (foto) => {
    const yaEsta = seleccionadas.find(f=>f.id===foto.id);
    if(yaEsta) { setSeleccionadas(seleccionadas.filter(f=>f.id!==foto.id)); return; }
    if(seleccionadas.length>=10) return;
    setSeleccionadas([...seleccionadas,foto]);
  };

  const confirmarGaleria = () => {
    setFotos(seleccionadas.map(f=>({...f,desc:""})));
    setPaso("confirmar");
  };

  const tomarFoto = () => {
    const nueva = {id:Date.now(),emoji:emojis[Math.floor(Math.random()*emojis.length)],nombre:"FOTO_"+hora+".jpg",desc:""};
    setFotos([nueva]);
    setPaso("confirmar");
  };

  const quitarFoto = (id) => setFotos(fotos.filter(f=>f.id!==id));
  const setDesc = (id,val) => setFotos(fotos.map(f=>f.id===id?{...f,desc:val}:f));

  const handleEnviar = () => {
    const nuevas = fotos.map(f=>({hora,emoji:f.emoji,desc:f.desc||descComun||"Avance registrado"}));
    onEnviar(nuevas);
  };

  return (
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.95)",zIndex:50,display:"flex",flexDirection:"column",animation:"fadeIn 0.2s ease"}}>

      {/* Header */}
      <div style={{padding:"18px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1e2d45",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {paso!=="elegir"&&(
            <button onClick={()=>setPaso(paso==="confirmar"?(fotos.length&&seleccionadas.length?"galeria":"elegir"):"elegir")}
              style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:8,width:30,height:30,color:"#fff",fontSize:16,cursor:"pointer"}}>←</button>
          )}
          <div>
            <h2 style={{fontSize:17,fontWeight:800,color:"#fff",margin:0,fontFamily:"'Sora',sans-serif"}}>📸 Foto Rápida</h2>
            <p style={{fontSize:11,color:"#445566",margin:"2px 0 0"}}>
              {paso==="elegir"&&"¿Cómo quieres agregar fotos?"}
              {paso==="camara"&&"Tomando foto..."}
              {paso==="galeria"&&`${seleccionadas.length}/10 seleccionadas`}
              {paso==="confirmar"&&`${fotos.length} foto${fotos.length>1?"s":""} listas para enviar`}
            </p>
          </div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,width:34,height:34,color:"#fff",fontSize:18,cursor:"pointer"}}>×</button>
      </div>

      {/* PASO: Elegir origen */}
      {paso==="elegir"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"20px"}}>
          <button onClick={tomarFoto}
            style={{background:"#0D1420",border:"2px solid #1e2d45",borderRadius:22,padding:"28px 20px",marginBottom:16,cursor:"pointer",display:"flex",alignItems:"center",gap:18,transition:"all 0.2s",width:"100%"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#10B981"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#1e2d45"}>
            <div style={{width:60,height:60,borderRadius:18,background:"linear-gradient(135deg,#10B981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>📷</div>
            <div style={{textAlign:"left"}}>
              <p style={{fontSize:16,fontWeight:700,color:"#fff",margin:0}}>Tomar foto</p>
              <p style={{fontSize:12,color:"#445566",margin:"4px 0 0"}}>Abre la cámara ahora</p>
            </div>
          </button>
          <button onClick={()=>setPaso("galeria")}
            style={{background:"#0D1420",border:"2px solid #1e2d45",borderRadius:22,padding:"28px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:18,transition:"all 0.2s",width:"100%"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#3B82F6"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#1e2d45"}>
            <div style={{width:60,height:60,borderRadius:18,background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>🖼️</div>
            <div style={{textAlign:"left"}}>
              <p style={{fontSize:16,fontWeight:700,color:"#fff",margin:0}}>Elegir de galería</p>
              <p style={{fontSize:12,color:"#445566",margin:"4px 0 0"}}>Selecciona hasta 10 fotos a la vez</p>
            </div>
          </button>
          <div style={{background:"#10B98114",border:"1px solid #10B98133",borderRadius:12,padding:"10px 14px",marginTop:20,display:"flex",alignItems:"center",gap:8}}>
            <span>👁️</span>
            <p style={{fontSize:11,color:"#10B981",margin:0,fontWeight:600}}>El mandante las verá al instante en su portal</p>
          </div>
        </div>
      )}

      {/* PASO: Galería con selección múltiple */}
      {paso==="galeria"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{flex:1,overflowY:"auto",padding:"14px 20px"}}>
            <p style={{fontSize:11,color:"#445566",marginBottom:12}}>Toca para seleccionar · máximo 10 fotos</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {GALERIA_DEMO.map(foto=>{
                const sel = seleccionadas.find(f=>f.id===foto.id);
                const idx = seleccionadas.findIndex(f=>f.id===foto.id);
                const bloqueada = !sel && seleccionadas.length>=10;
                return (
                  <div key={foto.id} onClick={()=>!bloqueada&&toggleSeleccion(foto)}
                    style={{aspectRatio:"1",background:"#0D1420",borderRadius:14,
                      border:`2px solid ${sel?"#3B82F6":"#1e2d45"}`,
                      display:"flex",flexDirection:"column",alignItems:"center",
                      justifyContent:"center",cursor:bloqueada?"not-allowed":"pointer",
                      position:"relative",opacity:bloqueada?0.4:1,transition:"all 0.15s"}}>
                    <span style={{fontSize:32}}>{foto.emoji}</span>
                    <span style={{fontSize:9,color:"#445566",marginTop:4}}>{foto.nombre}</span>
                    {sel&&(
                      <div style={{position:"absolute",top:6,right:6,width:22,height:22,
                        borderRadius:"50%",background:"#3B82F6",display:"flex",
                        alignItems:"center",justifyContent:"center",fontSize:11,
                        fontWeight:800,color:"#fff"}}>
                        {idx+1}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{padding:"14px 20px 28px",flexShrink:0}}>
            <button onClick={confirmarGaleria} disabled={seleccionadas.length===0}
              style={{width:"100%",background:seleccionadas.length?"linear-gradient(135deg,#3B82F6,#1D4ED8)":"#1e2d45",
                border:"none",borderRadius:14,padding:15,color:seleccionadas.length?"#fff":"#445566",
                fontSize:15,fontWeight:700,cursor:seleccionadas.length?"pointer":"default",
                boxShadow:seleccionadas.length?"0 4px 20px #3B82F644":"none"}}>
              {seleccionadas.length?`Confirmar ${seleccionadas.length} foto${seleccionadas.length>1?"s":""}  →`:"Selecciona al menos 1 foto"}
            </button>
          </div>
        </div>
      )}

      {/* PASO: Confirmar + descripción */}
      {paso==="confirmar"&&(
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{flex:1,overflowY:"auto",padding:"14px 20px"}}>
            {/* Descripción común */}
            <input placeholder="Descripción para todas (opcional)..."
              value={descComun} onChange={e=>setDescComun(e.target.value)}
              style={{width:"100%",padding:"12px 14px",background:"#111827",
                border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",
                fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",
                boxSizing:"border-box",marginBottom:14}}
              onFocus={e=>e.target.style.border="1.5px solid #10B981"}
              onBlur={e=>e.target.style.border="1.5px solid #1e2d45"}/>

            {/* Lista fotos con desc individual */}
            {fotos.map((f,i)=>(
              <div key={f.id} style={{background:"#0D1420",borderRadius:14,
                border:"1px solid #1e2d45",marginBottom:10,
                display:"flex",alignItems:"center",gap:12,padding:"10px 14px"}}>
                <div style={{width:46,height:46,borderRadius:12,background:"#111827",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>
                  {f.emoji}
                </div>
                <input placeholder={`Foto ${i+1} — descripción (opcional)`}
                  value={f.desc} onChange={e=>setDesc(f.id,e.target.value)}
                  style={{flex:1,background:"transparent",border:"none",color:"#8899BB",
                    fontSize:12,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                <button onClick={()=>quitarFoto(f.id)}
                  style={{background:"none",border:"none",color:"#EF4444",fontSize:18,cursor:"pointer",flexShrink:0}}>×</button>
              </div>
            ))}

            <div style={{background:"#10B98114",border:"1px solid #10B98133",
              borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <span>👁️</span>
              <p style={{fontSize:11,color:"#10B981",margin:0,fontWeight:600}}>
                El mandante verá {fotos.length} foto{fotos.length>1?"s":""} al instante
              </p>
            </div>
          </div>

          <div style={{padding:"14px 20px 28px",flexShrink:0}}>
            <button onClick={handleEnviar} disabled={fotos.length===0}
              style={{width:"100%",background:"linear-gradient(135deg,#10B981,#059669)",
                border:"none",borderRadius:14,padding:15,color:"#fff",fontSize:15,
                fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px #10B98144"}}>
              ✓ Enviar {fotos.length} foto{fotos.length>1?"s":""} al mandante
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const OBRAS_RD = ["Edif. Los Aromos","Cond. El Roble","Casa Familia Torres"];
const CLIMAS_RD = [{icon:"☀️",label:"Despejado"},{icon:"⛅",label:"Nublado parcial"},{icon:"☁️",label:"Nublado"},{icon:"🌧️",label:"Lluvia"},{icon:"⛈️",label:"Tormenta"},{icon:"🌬️",label:"Viento fuerte"},{icon:"🌫️",label:"Neblina"}];
const GREMIOS_RD = ["Albañilería","Estructura","Moldaje","Hormigonado","Gasfitería","Electricidad","Pintura","Carpintería","Terminaciones"];
const PARTIDAS_RD = ["Fundaciones","Estructura","Albañilería","Instalaciones eléctricas","Instalaciones sanitarias","Moldaje y hormigón","Terminaciones","Pintura","Pavimentos"];
const PASOS_RD = [{id:1,label:"General",icon:"📋"},{id:2,label:"Personal",icon:"👷"},{id:3,label:"Actividades",icon:"✏️"},{id:4,label:"Observaciones",icon:"📝"}];
const initForm = () => ({obra:OBRAS_RD[0],fecha:new Date().toISOString().split("T")[0],clima:0,personalTotal:14,actividades:[{partida:"Albañilería",descripcion:"",avance:0}],incidentes:"",observaciones:""});

function RDInput({label,value,onChange,type="text",placeholder="",style={}}) {
  return (
    <div style={{marginBottom:14,...style}}>
      {label&&<label style={{fontSize:11,fontWeight:600,color:"#8899BB",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</label>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:"100%",padding:"11px 14px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box",transition:"border 0.2s"}}
        onFocus={e=>e.target.style.border="1.5px solid #3B82F6"}
        onBlur={e=>e.target.style.border="1.5px solid #1e2d45"}/>
    </div>
  );
}

function RDTextarea({label,value,onChange,placeholder,rows=3}) {
  return (
    <div style={{marginBottom:14}}>
      {label&&<label style={{fontSize:11,fontWeight:600,color:"#8899BB",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</label>}
      <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
        style={{width:"100%",padding:"11px 14px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"vertical",boxSizing:"border-box"}}
        onFocus={e=>e.target.style.border="1.5px solid #3B82F6"}
        onBlur={e=>e.target.style.border="1.5px solid #1e2d45"}/>
    </div>
  );
}

function RDCard({title,icon,children}) {
  return (
    <div style={{background:"#111827",border:"1px solid #1e2d45",borderRadius:20,marginBottom:16,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
      <div style={{padding:"14px 20px",borderBottom:"1px solid #1e2d45",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:17}}>{icon}</span>
        <span style={{fontSize:13,fontWeight:700,color:"#F0F4FF",fontFamily:"'Sora',sans-serif"}}>{title}</span>
      </div>
      <div style={{padding:"18px 20px"}}>{children}</div>
    </div>
  );
}

function RegistroDiario({t}) {
  const [paso,setPaso] = React.useState(1);
  const [form,setForm] = React.useState(initForm());
  const [vista,setVista] = React.useState("form");

  const addAct = () => setForm({...form,actividades:[...form.actividades,{partida:PARTIDAS_RD[0],descripcion:"",avance:0}]});
  const remAct = i => setForm({...form,actividades:form.actividades.filter((_,j)=>j!==i)});
  const setAct = (i,f,v) => { const a=[...form.actividades]; a[i]={...a[i],[f]:v}; setForm({...form,actividades:a}); };

  const sel = (v,cur,col) => ({padding:"11px 12px",background:"#0D1420",border:`1.5px solid ${v===cur?"#3B82F6":"#1e2d45"}`,borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",width:"100%"});

  if(vista==="exito") return (
    <div style={{textAlign:"center",padding:"40px 20px",animation:"fadeIn 0.5s ease"}}>
      <div style={{width:80,height:80,borderRadius:"50%",margin:"0 auto 24px",background:"linear-gradient(135deg,#10B981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,boxShadow:"0 8px 32px #10B98144"}}>✓</div>
      <h2 style={{fontSize:22,fontWeight:800,color:t.text,margin:"0 0 10px",fontFamily:"'Sora',sans-serif"}}>¡Registro guardado!</h2>
      <p style={{fontSize:13,color:t.textSub,margin:"0 0 6px"}}>{form.obra} · {new Date(form.fecha+"T12:00").toLocaleDateString("es-CL",{day:"numeric",month:"long"})}</p>
      <p style={{fontSize:12,color:t.textMuted,margin:"0 0 28px"}}>{form.actividades.length} actividades · {form.personalTotal} personas · {CLIMAS_RD[form.clima].icon}</p>
      <div style={{background:"#3B82F618",border:"1px solid #3B82F633",borderRadius:14,padding:16,marginBottom:24}}>
        <p style={{fontSize:13,color:"#3B82F6",fontWeight:600,margin:"0 0 6px"}}>🤖 La IA ya está procesando el reporte</p>
        <p style={{fontSize:11,color:t.textMuted,margin:0}}>El mandante recibirá el resumen automático el lunes</p>
      </div>
      <div style={{display:"flex",gap:12}}>
        <button onClick={()=>{setForm(initForm());setPaso(1);setVista("form");}} style={{flex:1,padding:"13px",background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Nuevo registro</button>
        <button style={{flex:1,padding:"13px",background:"#111827",border:"1px solid #1e2d45",borderRadius:14,color:"#8899BB",fontSize:14,cursor:"pointer"}}>Ver historial</button>
      </div>
    </div>
  );

  if(vista==="resumen") return (
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{background:"#3B82F618",border:"1px solid #3B82F633",borderRadius:20,padding:22,marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:22}}>📋</span>
        <div><h2 style={{fontSize:17,fontWeight:800,color:t.text,margin:0,fontFamily:"'Sora',sans-serif"}}>Resumen del Registro</h2><p style={{fontSize:11,color:t.textMuted,margin:"3px 0 0"}}>Revisa antes de guardar</p></div>
      </div>
      {[{label:"Obra",value:form.obra},{label:"Fecha",value:new Date(form.fecha+"T12:00").toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long"})},{label:"Clima",value:`${CLIMAS_RD[form.clima].icon} ${CLIMAS_RD[form.clima].label}`},{label:"Personal",value:`${form.personalTotal} personas`},{label:"Actividades",value:`${form.actividades.length} registradas`}].map((row,i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:`1px solid ${t.border}`}}>
          <span style={{fontSize:13,color:t.textMuted}}>{row.label}</span>
          <span style={{fontSize:13,fontWeight:600,color:t.text}}>{row.value}</span>
        </div>
      ))}
      {form.actividades.length>0&&(
        <div style={{marginTop:14,background:t.bgCard,borderRadius:16,padding:16,border:`1px solid ${t.border}`}}>
          <p style={{fontSize:11,fontWeight:700,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:12}}>Actividades</p>
          {form.actividades.map((a,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<form.actividades.length-1?`1px solid ${t.border}`:"none"}}>
              <div><p style={{fontSize:13,fontWeight:600,color:t.text,margin:0}}>{a.partida}</p>{a.descripcion&&<p style={{fontSize:11,color:t.textMuted,margin:"2px 0 0"}}>{a.descripcion}</p>}</div>
              <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:(a.avance===100?"#10B981":a.avance>50?"#F59E0B":"#3B82F6")+"22",color:a.avance===100?"#10B981":a.avance>50?"#F59E0B":"#3B82F6"}}>{a.avance}%</span>
            </div>
          ))}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:20}}>
        <button onClick={()=>setVista("form")} style={{padding:"13px",background:t.bgCard2,border:`1px solid ${t.border}`,borderRadius:14,color:t.textSub,fontSize:14,fontWeight:600,cursor:"pointer"}}>← Editar</button>
        <button onClick={()=>setVista("exito")} style={{padding:"13px",background:"linear-gradient(135deg,#10B981,#059669)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px #10B98144"}}>✓ Guardar Registro</button>
      </div>
    </div>
  );

  return (
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <style>{`input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:#1e2d45;}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#3B82F6;cursor:pointer;}`}</style>
      {/* Progress */}
      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {PASOS_RD.map(p=>(
          <button key={p.id} onClick={()=>setPaso(p.id)} style={{flex:1,padding:"9px 4px",borderRadius:14,cursor:"pointer",border:"none",background:paso===p.id?"linear-gradient(135deg,#3B82F6,#1D4ED8)":paso>p.id?"#10B98118":`${t.bgCard}`,display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.2s"}}>
            <span style={{fontSize:15}}>{paso>p.id?"✓":p.icon}</span>
            <span style={{fontSize:9,fontWeight:700,color:paso===p.id?"#fff":paso>p.id?"#10B981":t.textMuted}}>{p.label}</span>
          </button>
        ))}
      </div>

      {/* Paso 1 */}
      {paso===1&&(
        <div>
          <RDCard title="Información General" icon="📋">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{marginBottom:0}}>
                <label style={{fontSize:11,fontWeight:600,color:"#8899BB",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Obra</label>
                <select value={form.obra} onChange={e=>setForm({...form,obra:e.target.value})} style={sel(form.obra,form.obra,"")}>
                  {OBRAS_RD.map(o=><option key={o} value={o} style={{background:"#111827"}}>{o}</option>)}
                </select>
              </div>
              <RDInput label="Fecha" type="date" value={form.fecha} onChange={v=>setForm({...form,fecha:v})}/>
            </div>
          </RDCard>
          <RDCard title="Clima del Día" icon="🌤️">
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {CLIMAS_RD.map((c,i)=>(
                <button key={i} onClick={()=>setForm({...form,clima:i})} style={{padding:"11px 6px",borderRadius:14,cursor:"pointer",background:form.clima===i?"#3B82F622":"#1a2235",border:form.clima===i?"2px solid #3B82F6":"1px solid #1e2d45",display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  <span style={{fontSize:20}}>{c.icon}</span>
                  <span style={{fontSize:9,color:form.clima===i?"#3B82F6":"#445566",fontWeight:600,textAlign:"center",lineHeight:1.2}}>{c.label}</span>
                </button>
              ))}
            </div>
          </RDCard>
        </div>
      )}

      {/* Paso 2 */}
      {paso===2&&(
        <RDCard title="Personal en Obra" icon="👷">
          <p style={{fontSize:12,color:"#8899BB",marginBottom:16}}>¿Cuántas personas trabajaron hoy en la obra?</p>
          <div style={{display:"flex",alignItems:"center",gap:16,justifyContent:"center",padding:"8px 0"}}>
            <button onClick={()=>setForm({...form,personalTotal:Math.max(1,form.personalTotal-1)})}
              style={{width:52,height:52,borderRadius:14,background:"#1a2235",border:"1.5px solid #1e2d45",fontSize:24,fontWeight:700,color:"#8899BB",cursor:"pointer"}}>−</button>
            <div style={{textAlign:"center",minWidth:80}}>
              <input type="number" value={form.personalTotal} min={1}
                onChange={e=>setForm({...form,personalTotal:Math.max(1,+e.target.value||1)})}
                style={{width:"100%",background:"transparent",border:"none",color:"#3B82F6",fontSize:44,fontWeight:800,textAlign:"center",fontFamily:"'Sora',sans-serif",outline:"none"}}/>
              <p style={{fontSize:11,color:"#445566",margin:0}}>personas en obra hoy</p>
            </div>
            <button onClick={()=>setForm({...form,personalTotal:form.personalTotal+1})}
              style={{width:52,height:52,borderRadius:14,background:"#1a2235",border:"1.5px solid #1e2d45",fontSize:24,fontWeight:700,color:"#8899BB",cursor:"pointer"}}>+</button>
          </div>
        </RDCard>
      )}

      {/* Paso 3 */}
      {paso===3&&(
        <RDCard title="Actividades Realizadas" icon="✏️">
          {form.actividades.map((a,i)=>(
            <div key={i} style={{background:"#1a2235",borderRadius:16,padding:16,marginBottom:12,border:"1px solid #1e2d45"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:"#3B82F622",color:"#3B82F6"}}>Actividad {i+1}</span>
                <button onClick={()=>remAct(i)} style={{background:"none",border:"none",color:"#EF4444",fontSize:18,cursor:"pointer"}}>×</button>
              </div>
              <select value={a.partida} onChange={e=>setAct(i,"partida",e.target.value)} style={{width:"100%",padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",marginBottom:10}}>
                {PARTIDAS_RD.map(p=><option key={p} value={p} style={{background:"#111827"}}>{p}</option>)}
              </select>
              <textarea value={a.descripcion} rows={2} onChange={e=>setAct(i,"descripcion",e.target.value)} placeholder="¿Qué se hizo hoy en esta partida?"
                style={{width:"100%",padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"none",boxSizing:"border-box",marginBottom:12}}/>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <label style={{fontSize:11,fontWeight:600,color:"#8899BB",textTransform:"uppercase",letterSpacing:"0.5px"}}>% Avance hoy</label>
                <span style={{fontSize:14,fontWeight:800,color:"#3B82F6",fontFamily:"'Sora',sans-serif"}}>{a.avance}%</span>
              </div>
              <input type="range" min={0} max={100} value={a.avance} onChange={e=>setAct(i,"avance",+e.target.value)} style={{width:"100%",accentColor:"#3B82F6"}}/>
            </div>
          ))}
          <button onClick={addAct} style={{background:"none",border:"1px dashed #3B82F666",borderRadius:10,padding:"8px 14px",color:"#3B82F6",fontSize:12,fontWeight:600,cursor:"pointer",width:"100%"}}>+ Agregar actividad</button>
        </RDCard>
      )}

      {/* Paso 4 */}
      {paso===4&&(
        <div>
          <RDCard title="Incidentes y Seguridad" icon="⚠️">
            {/* Check rápido */}
            <button onClick={()=>setForm({...form,incidentes:form.incidentes==="Sin incidentes en el día"?"":"Sin incidentes en el día"})}
              style={{width:"100%",padding:"12px 16px",borderRadius:12,marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",gap:12,
                background:form.incidentes==="Sin incidentes en el día"?"#10B98118":"#1a2235",
                border:`1.5px solid ${form.incidentes==="Sin incidentes en el día"?"#10B981":"#1e2d45"}`}}>
              <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${form.incidentes==="Sin incidentes en el día"?"#10B981":"#445566"}`,
                background:form.incidentes==="Sin incidentes en el día"?"#10B981":"transparent",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {form.incidentes==="Sin incidentes en el día"&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
              </div>
              <span style={{fontSize:13,fontWeight:600,color:form.incidentes==="Sin incidentes en el día"?"#10B981":"#8899BB"}}>Sin incidentes en el día</span>
            </button>
            {form.incidentes!=="Sin incidentes en el día"&&(
              <textarea value={form.incidentes} onChange={e=>setForm({...form,incidentes:e.target.value})} rows={3}
                placeholder="Describe accidentes, cuasi-accidentes o situaciones de riesgo..."
                style={{width:"100%",padding:"11px 14px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"vertical",boxSizing:"border-box"}}
                onFocus={e=>e.target.style.border="1.5px solid #EF4444"}
                onBlur={e=>e.target.style.border="1.5px solid #1e2d45"}/>
            )}
          </RDCard>
          <RDCard title="Observaciones Generales" icon="📝">
            {/* Check rápido */}
            <button onClick={()=>setForm({...form,observaciones:form.observaciones==="Sin observaciones generales"?"":"Sin observaciones generales"})}
              style={{width:"100%",padding:"12px 16px",borderRadius:12,marginBottom:12,cursor:"pointer",display:"flex",alignItems:"center",gap:12,
                background:form.observaciones==="Sin observaciones generales"?"#10B98118":"#1a2235",
                border:`1.5px solid ${form.observaciones==="Sin observaciones generales"?"#10B981":"#1e2d45"}`}}>
              <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${form.observaciones==="Sin observaciones generales"?"#10B981":"#445566"}`,
                background:form.observaciones==="Sin observaciones generales"?"#10B981":"transparent",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {form.observaciones==="Sin observaciones generales"&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
              </div>
              <span style={{fontSize:13,fontWeight:600,color:form.observaciones==="Sin observaciones generales"?"#10B981":"#8899BB"}}>Sin observaciones generales</span>
            </button>
            {form.observaciones!=="Sin observaciones generales"&&(
              <textarea value={form.observaciones} onChange={e=>setForm({...form,observaciones:e.target.value})} rows={5}
                placeholder="Visitas, problemas de diseño, instrucciones del mandante, coordinaciones pendientes..."
                style={{width:"100%",padding:"11px 14px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"vertical",boxSizing:"border-box"}}
                onFocus={e=>e.target.style.border="1.5px solid #3B82F6"}
                onBlur={e=>e.target.style.border="1.5px solid #1e2d45"}/>
            )}
          </RDCard>
          <RDCard title="Registro Fotográfico" icon="📸">
            <div style={{background:"#1a2235",border:"2px dashed #1e2d45",borderRadius:16,padding:28,textAlign:"center",cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#3B82F6"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="#1e2d45"}>
              <div style={{fontSize:32,marginBottom:10}}>📷</div>
              <p style={{fontSize:13,fontWeight:600,color:"#8899BB",margin:0}}>Subir fotos del avance</p>
              <p style={{fontSize:11,color:"#445566",margin:"6px 0 14px"}}>JPG, PNG · Máximo 20 fotos</p>
              <button style={{background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:10,padding:"9px 20px",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Seleccionar fotos</button>
            </div>
          </RDCard>
        </div>
      )}

      {/* Navegación */}
      <div style={{display:"flex",gap:12,marginTop:8}}>
        {paso>1&&<button onClick={()=>setPaso(paso-1)} style={{flex:1,padding:"13px",background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:14,color:t.textSub,fontSize:14,fontWeight:600,cursor:"pointer"}}>← Anterior</button>}
        <button onClick={()=>paso===4?setVista("resumen"):setPaso(paso+1)}
          style={{flex:2,padding:"13px",background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px #3B82F644"}}>
          {paso===4?"Revisar registro →":"Siguiente →"}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [darkMode,setDarkMode] = React.useState(false);
  const [session,setSession]   = React.useState(null);
  const [loading,setLoading]   = React.useState(true);
  const [view,setView]         = React.useState("web");
  const t = themes[darkMode?"dark":"light"];
  const toggleDark = () => setDarkMode(d=>!d);

  React.useEffect(()=>{
    // Revisar sesión existente al cargar
    supabase.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      setLoading(false);
    });
    // Escuchar cambios de sesión (login/logout)
    const {data:{subscription}} = supabase.auth.onAuthStateChange((_,session)=>{
      setSession(session);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const handleLogout = async () => {
    await supabase.auth.signOut();
    setSession(null);
  };

  if(loading) return (
    <div style={{minHeight:"100vh",background:"#0A0E1A",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <LogoIcon size={52}/>
      <p style={{color:"#445566",fontSize:13,fontFamily:"'DM Sans',sans-serif"}}>Cargando...</p>
    </div>
  );

  if(!session) return <LoginScreen onLogin={()=>{}} t={t} darkMode={darkMode} toggleDark={toggleDark}/>;

  return (
    <div>
      <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",gap:6,background:darkMode?"rgba(10,14,26,0.9)":"rgba(255,255,255,0.9)",backdropFilter:"blur(12px)",borderRadius:14,padding:6,border:`1px solid ${t.border}`,boxShadow:t.shadow}}>
        {["web","mobile"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{padding:"6px 14px",borderRadius:10,fontSize:12,fontWeight:600,background:view===v?`linear-gradient(135deg,${t.blue},${t.blueDark})`:"transparent",border:"none",color:view===v?"#fff":t.textMuted,cursor:"pointer",transition:"all 0.2s"}}>
            {v==="web"?"🖥️ Web":"📱 Móvil"}
          </button>
        ))}
      </div>
      {view==="web"
        ?<DashboardWeb    t={t} darkMode={darkMode} toggleDark={toggleDark} onLogout={handleLogout} session={session}/>
        :<DashboardMobile t={t} darkMode={darkMode} toggleDark={toggleDark} onLogout={handleLogout} session={session}/>
      }
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
