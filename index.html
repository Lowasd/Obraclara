<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ObraClara — Control de obras inteligente</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .mob-btn{transition:transform 0.1s,opacity 0.1s;cursor:pointer;}
    .mob-btn:active{transform:scale(0.95);opacity:0.8;}
    .mob-scroll{overflow-y:auto;height:100%;padding-bottom:80px;}
    .mob-scroll::-webkit-scrollbar{display:none;}
    textarea:focus{outline:none;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const themes = {
  dark: {
    bg:"#0A0E1A", bgCard:"#111827", bgCard2:"#1a2235", border:"#1e2d45",
    text:"#F0F4FF", textSub:"#8899BB", textMuted:"#445566",
    blue:"#3B82F6", blueDark:"#1D4ED8", blueGlow:"#3B82F620",
    green:"#10B981", red:"#EF4444", yellow:"#F59E0B",
    navBg:"#0D1420", inputBg:"#0D1420",
    shadow:"0 8px 32px rgba(0,0,0,0.5)",
  },
  light: {
    bg:"#F0F4FF", bgCard:"#FFFFFF", bgCard2:"#EBF0FF", border:"#CBD5E1",
    text:"#0F172A", textSub:"#475569", textMuted:"#94A3B8",
    blue:"#2563EB", blueDark:"#1D4ED8", blueGlow:"#2563EB15",
    green:"#059669", red:"#DC2626", yellow:"#D97706",
    navBg:"#FFFFFF", inputBg:"#F8FAFF",
    shadow:"0 4px 24px rgba(37,99,235,0.08)",
  }
};

const obras = [
  {id:1,nombre:"Edif. Los Aromos",ubicacion:"Santiago Centro",avance:67,plan:75,estado:"atrasado",presup:68000000,gastado:45200000},
  {id:2,nombre:"Cond. El Roble",ubicacion:"Providencia",avance:42,plan:40,estado:"adelantado",presup:120000000,gastado:48000000},
  {id:3,nombre:"Casa Familia Torres",ubicacion:"Las Condes",avance:89,plan:90,estado:"normal",presup:18000000,gastado:16100000},
];

const alertas = [
  {tipo:"danger", msg:"Fierro 12mm bajo stock crítico — 2 días restantes", obra:"Los Aromos"},
  {tipo:"warning",msg:"Albañilería sin avance registrado hace 3 días",     obra:"Los Aromos"},
  {tipo:"info",   msg:"Reporte semanal listo para enviar al mandante",     obra:"El Roble"},
];

const actividad = [
  {hora:"08:42",icon:"📸",user:"Carlos M.",   txt:"Registró avance — Albañilería 3er piso",   tag:"foto"},
  {hora:"07:15",icon:"🤖",user:"IA ObraClara",txt:"Reporte semanal generado automáticamente", tag:"ia"},
  {hora:"Ayer", icon:"📦",user:"Pedro J.",    txt:"450 sacos cemento ingresados a bodega",     tag:"bodega"},
  {hora:"Ayer", icon:"✏️",user:"Carlos M.",   txt:"Actualizó carta Gantt — estructura sem.22", tag:"avance"},
];

const fmt = n => "$"+(n/1000000).toFixed(1)+"M";

const StatusBadge = ({estado,t}) => {
  const cfg = {
    atrasado:  {color:t.red,   label:"⚠ Atrasado"},
    adelantado:{color:t.green, label:"↑ Adelantado"},
    normal:    {color:t.yellow,label:"● En plazo"},
  }[estado]||{color:t.textMuted,label:estado};
  return <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:cfg.color+"22",color:cfg.color}}>{cfg.label}</span>;
};

const ProgressBar = ({value,plan,color,t}) => (
  <div>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
      <span style={{fontSize:11,color:t.textSub}}>Avance real</span>
      <span style={{fontSize:12,fontWeight:700,color}}>{Math.round(value)}% <span style={{color:t.textMuted,fontWeight:400}}>/ {plan}% plan</span></span>
    </div>
    <div style={{height:6,background:t.border,borderRadius:3,overflow:"hidden",position:"relative"}}>
      <div style={{position:"absolute",height:"100%",width:plan+"%",background:t.border+"99",borderRadius:3}}/>
      <div style={{position:"absolute",height:"100%",width:value+"%",background:`linear-gradient(90deg,${color}99,${color})`,borderRadius:3,transition:"width 1s"}}/>
    </div>
  </div>
);

function LoginScreen({onLogin,t,darkMode,toggleDark}) {
  const [loading,setLoading] = React.useState(false);
  const [email,setEmail] = React.useState("");
  const [pass,setPass]   = React.useState("");
  const [vista,setVista] = React.useState("login"); // "login" | "registro"
  const handleLogin = () => { setLoading(true); setTimeout(()=>{setLoading(false);onLogin();},1400); };
  return (
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20,
      backgroundImage:darkMode?"radial-gradient(ellipse at 20% 50%,#1e3a5f22 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#1e40af18 0%,transparent 50%)":"radial-gradient(ellipse at 20% 50%,#dbeafe 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#bfdbfe 0%,transparent 50%)"}}>
      <div style={{width:"100%",maxWidth:420}}>

        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:64,height:64,borderRadius:20,marginBottom:14,background:`linear-gradient(135deg,${t.blue},${t.blueDark})`,boxShadow:`0 8px 32px ${t.blue}44`}}>
            <span style={{fontSize:28}}>🏗️</span>
          </div>
          <h1 style={{fontFamily:"'Sora',sans-serif",fontSize:28,fontWeight:800,color:t.text,letterSpacing:"-0.5px",margin:0}}>
            Obra<span style={{color:t.blue}}>Clara</span>
          </h1>
          <p style={{fontSize:13,color:t.textSub,marginTop:6}}>Control de obras inteligente</p>
        </div>

        {/* Tabs login / registro */}
        <div style={{display:"flex",background:t.bgCard,borderRadius:16,padding:5,marginBottom:20,border:`1px solid ${t.border}`}}>
          {[{id:"login",label:"Ingresar"},{id:"registro",label:"Crear cuenta"}].map(tab=>(
            <button key={tab.id} onClick={()=>setVista(tab.id)}
              style={{flex:1,padding:"10px",borderRadius:12,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,transition:"all 0.2s",
                background:vista===tab.id?`linear-gradient(135deg,${t.blue},${t.blueDark})`:"transparent",
                color:vista===tab.id?"#fff":t.textMuted,
                boxShadow:vista===tab.id?`0 4px 12px ${t.blue}44`:"none"}}>
              {tab.label}
            </button>
          ))}
        </div>

        {/* Card */}
        <div style={{background:t.bgCard,borderRadius:24,padding:28,border:`1px solid ${t.border}`,boxShadow:t.shadow}}>
          {vista==="login" ? (
            <>
              <h2 style={{fontSize:17,fontWeight:700,color:t.text,marginBottom:4,fontFamily:"'Sora',sans-serif"}}>Bienvenido de vuelta</h2>
              <p style={{fontSize:13,color:t.textSub,marginBottom:22}}>Ingresa a tu cuenta para continuar</p>
              <div style={{marginBottom:14}}>
                <label style={{fontSize:11,fontWeight:600,color:t.textSub,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Email</label>
                <input value={email} onChange={e=>setEmail(e.target.value)}
                  placeholder="tuemail@tumail.cl"
                  style={{width:"100%",padding:"12px 14px",background:t.inputBg,border:`1.5px solid ${t.border}`,borderRadius:12,color:t.text,fontSize:14,outline:"none",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",transition:"border 0.2s"}}
                  onFocus={e=>e.target.style.border=`1.5px solid ${t.blue}`}
                  onBlur={e=>e.target.style.border=`1.5px solid ${t.border}`}/>
              </div>
              <div style={{marginBottom:22}}>
                <label style={{fontSize:11,fontWeight:600,color:t.textSub,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Contraseña</label>
                <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
                  placeholder="••••••••"
                  style={{width:"100%",padding:"12px 14px",background:t.inputBg,border:`1.5px solid ${t.border}`,borderRadius:12,color:t.text,fontSize:14,outline:"none",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",transition:"border 0.2s"}}
                  onFocus={e=>e.target.style.border=`1.5px solid ${t.blue}`}
                  onBlur={e=>e.target.style.border=`1.5px solid ${t.border}`}/>
                <div style={{textAlign:"right",marginTop:6}}>
                  <span style={{fontSize:12,color:t.blue,cursor:"pointer"}}>¿Olvidaste tu contraseña?</span>
                </div>
              </div>
              <button onClick={handleLogin}
                style={{width:"100%",padding:"14px",background:loading?t.border:`linear-gradient(135deg,${t.blue},${t.blueDark})`,border:"none",borderRadius:14,color:"#fff",fontSize:15,fontWeight:700,cursor:loading?"default":"pointer",fontFamily:"'Sora',sans-serif",boxShadow:loading?"none":`0 4px 20px ${t.blue}44`,transition:"all 0.2s"}}>
                {loading?"⏳ Ingresando...":"Ingresar →"}
              </button>
            </>
          ) : (
            <>
              <h2 style={{fontSize:17,fontWeight:700,color:t.text,marginBottom:4,fontFamily:"'Sora',sans-serif"}}>Crea tu cuenta gratis</h2>
              <p style={{fontSize:13,color:t.textSub,marginBottom:22}}>14 días gratis · Sin tarjeta de crédito</p>
              {[
                {label:"Nombre completo",   placeholder:"Juan Pérez",         type:"text"},
                {label:"Email",             placeholder:"tuemail@tumail.cl",  type:"email"},
                {label:"Empresa / Constructora", placeholder:"Constructora XYZ", type:"text"},
                {label:"Contraseña",        placeholder:"Mínimo 8 caracteres",type:"password"},
              ].map((f,i)=>(
                <div key={i} style={{marginBottom:14}}>
                  <label style={{fontSize:11,fontWeight:600,color:t.textSub,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{f.label}</label>
                  <input type={f.type} placeholder={f.placeholder}
                    style={{width:"100%",padding:"12px 14px",background:t.inputBg,border:`1.5px solid ${t.border}`,borderRadius:12,color:t.text,fontSize:14,outline:"none",fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",transition:"border 0.2s"}}
                    onFocus={e=>e.target.style.border=`1.5px solid ${t.blue}`}
                    onBlur={e=>e.target.style.border=`1.5px solid ${t.border}`}/>
                </div>
              ))}
              <button onClick={handleLogin}
                style={{width:"100%",padding:"14px",background:`linear-gradient(135deg,${t.green},#059669)`,border:"none",borderRadius:14,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Sora',sans-serif",boxShadow:`0 4px 20px ${t.green}44`,transition:"all 0.2s",marginTop:4}}>
                Crear cuenta gratis →
              </button>
              <p style={{textAlign:"center",fontSize:11,color:t.textMuted,marginTop:14}}>
                Al registrarte aceptas los <span style={{color:t.blue,cursor:"pointer"}}>Términos de uso</span>
              </p>
            </>
          )}
        </div>

        {/* Toggle día/noche */}
        <div style={{textAlign:"center",marginTop:18}}>
          <button onClick={toggleDark} style={{background:"none",border:`1px solid ${t.border}`,borderRadius:20,padding:"7px 18px",color:t.textSub,fontSize:12,cursor:"pointer",transition:"all 0.2s"}}
            onMouseEnter={e=>e.target.style.borderColor=t.blue}
            onMouseLeave={e=>e.target.style.borderColor=t.border}>
            {darkMode?"☀️ Modo día":"🌙 Modo noche"}
          </button>
        </div>
      </div>
    </div>
  );
}

function DashboardWeb({t,darkMode,toggleDark,onLogout}) {
  const [activeTab,setActiveTab] = React.useState("dashboard");
  const [activeObra,setActiveObra] = React.useState(0);

  const navItems = [
    {id:"dashboard",icon:"▦", label:"Dashboard"},
    {id:"obras",    icon:"🏗️",label:"Mis Obras"},
    {id:"registro", icon:"✏️",label:"Registro"},
    {id:"materiales",icon:"📦",label:"Materiales"},
    {id:"reportes", icon:"🤖",label:"Reportes IA"},
    {id:"mandante", icon:"👁️",label:"Mandante"},
  ];

  return (
    <div style={{display:"flex",height:"100vh",background:t.bg,fontFamily:"'DM Sans',sans-serif",overflow:"hidden"}}>
      {/* Sidebar */}
      <div style={{width:220,background:t.navBg,borderRight:`1px solid ${t.border}`,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"24px 20px 20px",borderBottom:`1px solid ${t.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${t.blue},${t.blueDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏗️</div>
            <div>
              <div style={{fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:16,color:t.text}}>Obra<span style={{color:t.blue}}>Clara</span></div>
              <div style={{fontSize:10,color:t.textMuted}}>PRO PLAN</div>
            </div>
          </div>
        </div>
        <nav style={{padding:"12px 10px",flex:1}}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>setActiveTab(item.id)}
              style={{width:"100%",padding:"9px 12px",borderRadius:10,display:"flex",alignItems:"center",gap:10,marginBottom:2,background:activeTab===item.id?t.blueGlow:"transparent",border:activeTab===item.id?`1px solid ${t.blue}33`:"1px solid transparent",color:activeTab===item.id?t.blue:t.textMuted,cursor:"pointer",transition:"all 0.15s"}}>
              <span style={{fontSize:15}}>{item.icon}</span>
              <span style={{fontSize:13,fontWeight:activeTab===item.id?600:400}}>{item.label}</span>
              {item.id==="reportes"&&<span style={{marginLeft:"auto",width:18,height:18,borderRadius:"50%",background:t.blue,color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>1</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:"12px 16px",borderTop:`1px solid ${t.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{width:32,height:32,borderRadius:"50%",background:`linear-gradient(135deg,${t.blue},${t.blueDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff"}}>RV</div>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:t.text}}>Roberto V.</div>
              <div style={{fontSize:10,color:t.textMuted}}>Constructor Civil</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={toggleDark} style={{flex:1,padding:"6px",background:t.bg,border:`1px solid ${t.border}`,borderRadius:8,color:t.textSub,fontSize:12,cursor:"pointer"}}>{darkMode?"☀️":"🌙"}</button>
            <button onClick={onLogout} style={{flex:1,padding:"6px",background:t.bg,border:`1px solid ${t.border}`,borderRadius:8,color:t.textSub,fontSize:11,cursor:"pointer"}}>Salir</button>
          </div>
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,overflow:"auto"}}>
        <div style={{padding:"16px 28px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:t.navBg,position:"sticky",top:0,zIndex:10}}>
          <div>
            <h1 style={{fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:800,color:t.text,margin:0}}>
              {{dashboard:"Dashboard General",obras:"Mis Obras",registro:"Registro Diario",materiales:"Materiales",reportes:"Reportes IA",mandante:"Portal Mandante"}[activeTab]}
            </h1>
            <p style={{fontSize:11,color:t.textMuted,margin:0,marginTop:2}}>Lunes 9 de marzo, 2026</p>
          </div>
          <div style={{display:"flex",gap:10}}>
            <div style={{position:"relative"}}>
              <button style={{background:t.bgCard2,border:`1px solid ${t.border}`,borderRadius:10,padding:"8px 12px",color:t.textSub,fontSize:14,cursor:"pointer"}}>🔔</button>
              <div style={{position:"absolute",top:5,right:7,width:8,height:8,background:t.red,borderRadius:"50%",border:`2px solid ${t.navBg}`}}/>
            </div>
            <button style={{background:`linear-gradient(135deg,${t.blue},${t.blueDark})`,border:"none",borderRadius:10,padding:"8px 18px",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Nueva Obra</button>
          </div>
        </div>

        <div style={{padding:"24px 28px",animation:"fadeIn 0.3s ease"}}>
          {activeTab==="dashboard"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}}>
                {[
                  {label:"Obras Activas",value:"3",sub:"2 en plazo · 1 atrasada",icon:"🏗️",color:t.blue},
                  {label:"Avance Promedio",value:"66%",sub:"+2% esta semana",icon:"📈",color:t.green},
                  {label:"Presupuesto",value:"$206M",sub:"$109M ejecutado",icon:"💰",color:t.yellow},
                  {label:"Alertas",value:"3",sub:"1 crítica · 2 medias",icon:"⚠️",color:t.red},
                ].map((k,i)=>(
                  <div key={i} style={{background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:16,padding:"18px 20px",boxShadow:t.shadow}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div>
                        <p style={{fontSize:11,color:t.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",margin:0}}>{k.label}</p>
                        <p style={{fontSize:28,fontWeight:800,color:t.text,margin:"6px 0 4px",fontFamily:"'Sora',sans-serif"}}>{k.value}</p>
                        <p style={{fontSize:11,color:t.textSub,margin:0}}>{k.sub}</p>
                      </div>
                      <div style={{width:40,height:40,borderRadius:12,background:k.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{k.icon}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:20}}>
                <div>
                  <h2 style={{fontSize:12,fontWeight:700,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:14}}>Estado de Obras</h2>
                  {obras.map((o,i)=>(
                    <div key={i} onClick={()=>{setActiveObra(i);setActiveTab("obras");}}
                      style={{background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:16,padding:20,marginBottom:12,cursor:"pointer",transition:"all 0.2s",boxShadow:t.shadow}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor=t.blue+"66"}
                      onMouseLeave={e=>e.currentTarget.style.borderColor=t.border}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
                        <div>
                          <p style={{fontSize:15,fontWeight:700,color:t.text,margin:0}}>{o.nombre}</p>
                          <p style={{fontSize:11,color:t.textMuted,margin:"4px 0 0"}}>📍 {o.ubicacion}</p>
                        </div>
                        <StatusBadge estado={o.estado} t={t}/>
                      </div>
                      <ProgressBar value={o.avance} plan={o.plan} color={o.estado==="atrasado"?t.red:o.estado==="adelantado"?t.green:t.blue} t={t}/>
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
                        <span style={{fontSize:11,color:t.textMuted}}>Presupuesto: <strong style={{color:t.text}}>{fmt(o.presupuesto)}</strong></span>
                        <span style={{fontSize:11,color:t.textMuted}}>Ejecutado: <strong style={{color:t.blue}}>{fmt(o.gastado)}</strong></span>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:16}}>
                  <div style={{background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:16,padding:18,boxShadow:t.shadow}}>
                    <h3 style={{fontSize:11,fontWeight:700,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:14}}>Alertas</h3>
                    {alertas.map((a,i)=>(
                      <div key={i} style={{display:"flex",gap:10,padding:"10px 0",borderBottom:i<alertas.length-1?`1px solid ${t.border}`:"none"}}>
                        <div style={{width:8,height:8,borderRadius:"50%",marginTop:5,flexShrink:0,background:a.tipo==="danger"?t.red:a.tipo==="warning"?t.yellow:t.blue}}/>
                        <div>
                          <p style={{fontSize:12,color:t.textSub,margin:0,lineHeight:1.5}}>{a.msg}</p>
                          <p style={{fontSize:10,color:t.textMuted,margin:"2px 0 0"}}>{a.obra}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:16,padding:18,boxShadow:t.shadow}}>
                    <h3 style={{fontSize:11,fontWeight:700,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:14}}>Actividad</h3>
                    {actividad.map((a,i)=>(
                      <div key={i} style={{display:"flex",gap:10,padding:"9px 0",borderBottom:i<actividad.length-1?`1px solid ${t.border}`:"none"}}>
                        <div style={{width:30,height:30,borderRadius:8,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,background:a.tag==="ia"?t.blue+"18":a.tag==="foto"?t.green+"18":t.yellow+"18"}}>{a.icon}</div>
                        <div>
                          <p style={{fontSize:11,fontWeight:600,color:t.textSub,margin:0}}>{a.user}</p>
                          <p style={{fontSize:11,color:t.textMuted,margin:"2px 0 0",lineHeight:1.4}}>{a.txt}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {activeTab==="obras"&&(
            <div>
              <div style={{display:"flex",gap:10,marginBottom:24}}>
                {obras.map((o,i)=>(
                  <button key={i} onClick={()=>setActiveObra(i)}

function RDInput({label,value,onChange,type="text",placeholder="",style={}}) {
  return (
    <div style={{marginBottom:14,...style}}>
      {label&&<label style={{fontSize:11,fontWeight:600,color:"#8899BB",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</label>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{width:"100%",padding:"11px 14px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box",transition:"border 0.2s"}}
        onFocus={e=>e.target.style.border="1.5px solid #3B82F6"}
        onBlur={e=>e.target.style.border="1.5px solid #1e2d45"}/>
    </div>
  );
}

function RDTextarea({label,value,onChange,placeholder,rows=3}) {
  return (
    <div style={{marginBottom:14}}>
      {label&&<label style={{fontSize:11,fontWeight:600,color:"#8899BB",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</label>}
      <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
        style={{width:"100%",padding:"11px 14px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"vertical",boxSizing:"border-box"}}
        onFocus={e=>e.target.style.border="1.5px solid #3B82F6"}
        onBlur={e=>e.target.style.border="1.5px solid #1e2d45"}/>
    </div>
  );
}

function RDCard({title,icon,children}) {
  return (
    <div style={{background:"#111827",border:"1px solid #1e2d45",borderRadius:20,marginBottom:16,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
      <div style={{padding:"14px 20px",borderBottom:"1px solid #1e2d45",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:17}}>{icon}</span>
        <span style={{fontSize:13,fontWeight:700,color:"#F0F4FF",fontFamily:"'Sora',sans-serif"}}>{title}</span>
      </div>
      <div style={{padding:"18px 20px"}}>{children}</div>
    </div>
  );
}

function RegistroDiario({t}) {
  const [paso,setPaso] = React.useState(1);
  const [form,setForm] = React.useState(initForm());
  const [vista,setVista] = React.useState("form");

  const addCuadrilla = () => setForm({...form,cuadrillas:[...form.cuadrillas,{gremio:GREMIOS_RD[0],cantidad:0}]});
  const remCuadrilla = i => setForm({...form,cuadrillas:form.cuadrillas.filter((_,j)=>j!==i)});
  const setCuad = (i,f,v) => { const a=[...form.cuadrillas]; a[i]={...a[i],[f]:v}; setForm({...form,cuadrillas:a}); };
  const addAct = () => setForm({...form,actividades:[...form.actividades,{partida:PARTIDAS_RD[0],descripcion:"",avance:0}]});
  const remAct = i => setForm({...form,actividades:form.actividades.filter((_,j)=>j!==i)});
  const setAct = (i,f,v) => { const a=[...form.actividades]; a[i]={...a[i],[f]:v}; setForm({...form,actividades:a}); };
  const addMat = () => setForm({...form,materiales:[...form.materiales,{nombre:"",cantidad:"",unidad:"m³",observacion:""}]});
  const remMat = i => setForm({...form,materiales:form.materiales.filter((_,j)=>j!==i)});
  const setMat = (i,f,v) => { const a=[...form.materiales]; a[i]={...a[i],[f]:v}; setForm({...form,materiales:a}); };
  const totalCalc = form.cuadrillas.reduce((s,c)=>s+(+c.cantidad||0),0);

  const sel = (v,cur,col) => ({padding:"11px 12px",background:"#0D1420",border:`1.5px solid ${v===cur?"#3B82F6":"#1e2d45"}`,borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",width:"100%"});

  if(vista==="exito") return (
    <div style={{textAlign:"center",padding:"40px 20px",animation:"fadeIn 0.5s ease"}}>
      <div style={{width:80,height:80,borderRadius:"50%",margin:"0 auto 24px",background:"linear-gradient(135deg,#10B981,#059669)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,boxShadow:"0 8px 32px #10B98144"}}>✓</div>
      <h2 style={{fontSize:22,fontWeight:800,color:t.text,margin:"0 0 10px",fontFamily:"'Sora',sans-serif"}}>¡Registro guardado!</h2>
      <p style={{fontSize:13,color:t.textSub,margin:"0 0 6px"}}>{form.obra} · {new Date(form.fecha+"T12:00").toLocaleDateString("es-CL",{day:"numeric",month:"long"})}</p>
      <p style={{fontSize:12,color:t.textMuted,margin:"0 0 28px"}}>{form.actividades.length} actividades · {form.personalTotal} personas · {CLIMAS_RD[form.clima].icon}</p>
      <div style={{background:"#3B82F618",border:"1px solid #3B82F633",borderRadius:14,padding:16,marginBottom:24}}>
        <p style={{fontSize:13,color:"#3B82F6",fontWeight:600,margin:"0 0 6px"}}>🤖 La IA ya está procesando el reporte</p>
        <p style={{fontSize:11,color:t.textMuted,margin:0}}>El mandante recibirá el resumen automático el lunes</p>
      </div>
      <div style={{display:"flex",gap:12}}>
        <button onClick={()=>{setForm(initForm());setPaso(1);setVista("form");}} style={{flex:1,padding:"13px",background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Nuevo registro</button>
        <button style={{flex:1,padding:"13px",background:"#111827",border:"1px solid #1e2d45",borderRadius:14,color:"#8899BB",fontSize:14,cursor:"pointer"}}>Ver historial</button>
      </div>
    </div>
  );

  if(vista==="resumen") return (
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <div style={{background:"#3B82F618",border:"1px solid #3B82F633",borderRadius:20,padding:22,marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:22}}>📋</span>
        <div><h2 style={{fontSize:17,fontWeight:800,color:t.text,margin:0,fontFamily:"'Sora',sans-serif"}}>Resumen del Registro</h2><p style={{fontSize:11,color:t.textMuted,margin:"3px 0 0"}}>Revisa antes de guardar</p></div>
      </div>
      {[{label:"Obra",value:form.obra},{label:"Fecha",value:new Date(form.fecha+"T12:00").toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long"})},{label:"Clima",value:`${CLIMAS_RD[form.clima].icon} ${CLIMAS_RD[form.clima].label}${form.temperatura?` · ${form.temperatura}°C`:""}`},{label:"Personal",value:`${form.personalTotal} personas`},{label:"Actividades",value:`${form.actividades.length} registradas`},{label:"Materiales",value:form.materiales.filter(m=>m.nombre).length+" registrados"}].map((row,i)=>(
        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:`1px solid ${t.border}`}}>
          <span style={{fontSize:13,color:t.textMuted}}>{row.label}</span>
          <span style={{fontSize:13,fontWeight:600,color:t.text}}>{row.value}</span>
        </div>
      ))}
      {form.actividades.length>0&&(
        <div style={{marginTop:14,background:t.bgCard,borderRadius:16,padding:16,border:`1px solid ${t.border}`}}>
          <p style={{fontSize:11,fontWeight:700,color:t.textMuted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:12}}>Actividades</p>
          {form.actividades.map((a,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<form.actividades.length-1?`1px solid ${t.border}`:"none"}}>
              <div><p style={{fontSize:13,fontWeight:600,color:t.text,margin:0}}>{a.partida}</p>{a.descripcion&&<p style={{fontSize:11,color:t.textMuted,margin:"2px 0 0"}}>{a.descripcion}</p>}</div>
              <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:(a.avance===100?"#10B981":a.avance>50?"#F59E0B":"#3B82F6")+"22",color:a.avance===100?"#10B981":a.avance>50?"#F59E0B":"#3B82F6"}}>{a.avance}%</span>
            </div>
          ))}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:20}}>
        <button onClick={()=>setVista("form")} style={{padding:"13px",background:t.bgCard2,border:`1px solid ${t.border}`,borderRadius:14,color:t.textSub,fontSize:14,fontWeight:600,cursor:"pointer"}}>← Editar</button>
        <button onClick={()=>setVista("exito")} style={{padding:"13px",background:"linear-gradient(135deg,#10B981,#059669)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px #10B98144"}}>✓ Guardar Registro</button>
      </div>
    </div>
  );

  return (
    <div style={{animation:"fadeIn 0.3s ease"}}>
      <style>{`input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;background:#1e2d45;}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#3B82F6;cursor:pointer;}`}</style>
      {/* Progress */}
      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {PASOS_RD.map(p=>(
          <button key={p.id} onClick={()=>setPaso(p.id)} style={{flex:1,padding:"9px 4px",borderRadius:14,cursor:"pointer",border:"none",background:paso===p.id?"linear-gradient(135deg,#3B82F6,#1D4ED8)":paso>p.id?"#10B98118":`${t.bgCard}`,display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.2s"}}>
            <span style={{fontSize:15}}>{paso>p.id?"✓":p.icon}</span>
            <span style={{fontSize:9,fontWeight:700,color:paso===p.id?"#fff":paso>p.id?"#10B981":t.textMuted}}>{p.label}</span>
          </button>
        ))}
      </div>

      {/* Paso 1 */}
      {paso===1&&(
        <div>
          <RDCard title="Información General" icon="📋">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{marginBottom:0}}>
                <label style={{fontSize:11,fontWeight:600,color:"#8899BB",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>Obra</label>
                <select value={form.obra} onChange={e=>setForm({...form,obra:e.target.value})} style={sel(form.obra,form.obra,"")}>
                  {OBRAS_RD.map(o=><option key={o} value={o} style={{background:"#111827"}}>{o}</option>)}
                </select>
              </div>
              <RDInput label="Fecha" type="date" value={form.fecha} onChange={v=>setForm({...form,fecha:v})}/>
            </div>
          </RDCard>
          <RDCard title="Clima del Día" icon="🌤️">
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
              {CLIMAS_RD.map((c,i)=>(
                <button key={i} onClick={()=>setForm({...form,clima:i})} style={{padding:"11px 6px",borderRadius:14,cursor:"pointer",background:form.clima===i?"#3B82F622":"#1a2235",border:form.clima===i?"2px solid #3B82F6":"1px solid #1e2d45",display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  <span style={{fontSize:20}}>{c.icon}</span>
                  <span style={{fontSize:9,color:form.clima===i?"#3B82F6":"#445566",fontWeight:600,textAlign:"center",lineHeight:1.2}}>{c.label}</span>
                </button>
              ))}
            </div>
            <RDInput label="Temperatura (°C)" type="number" value={form.temperatura} placeholder="Ej: 18" onChange={v=>setForm({...form,temperatura:v})}/>
          </RDCard>
        </div>
      )}

      {/* Paso 2 */}
      {paso===2&&(
        <RDCard title="Personal en Obra" icon="👷">
          <div style={{display:"flex",gap:12,marginBottom:18}}>
            <div style={{flex:1,background:"#3B82F618",border:"1px solid #3B82F633",borderRadius:14,padding:16,textAlign:"center"}}>
              <input type="number" value={form.personalTotal} onChange={e=>setForm({...form,personalTotal:+e.target.value})}
                style={{width:"100%",background:"transparent",border:"none",color:"#3B82F6",fontSize:28,fontWeight:800,textAlign:"center",fontFamily:"'Sora',sans-serif",outline:"none"}}/>
              <p style={{fontSize:10,color:"#445566",margin:0}}>Total ingresado</p>
            </div>
            <div style={{flex:1,background:"#10B98118",border:"1px solid #10B98133",borderRadius:14,padding:16,textAlign:"center"}}>
              <p style={{fontSize:28,fontWeight:800,color:"#10B981",margin:0,fontFamily:"'Sora',sans-serif"}}>{totalCalc}</p>
              <p style={{fontSize:10,color:"#445566",margin:0}}>Suma cuadrillas</p>
            </div>
          </div>
          <label style={{fontSize:11,fontWeight:600,color:"#8899BB",display:"block",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.5px"}}>Cuadrillas por gremio</label>
          {form.cuadrillas.map((c,i)=>(
            <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
              <select value={c.gremio} onChange={e=>setCuad(i,"gremio",e.target.value)} style={{flex:2,padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none"}}>
                {GREMIOS_RD.map(g=><option key={g} value={g} style={{background:"#111827"}}>{g}</option>)}
              </select>
              <input type="number" value={c.cantidad} min={0} onChange={e=>setCuad(i,"cantidad",+e.target.value)} placeholder="N°"
                style={{flex:1,padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,outline:"none"}}/>
              <button onClick={()=>remCuadrilla(i)} style={{background:"none",border:"none",color:"#EF4444",fontSize:18,cursor:"pointer",padding:"4px 8px"}}>×</button>
            </div>
          ))}
          <button onClick={addCuadrilla} style={{background:"none",border:"1px dashed #3B82F666",borderRadius:10,padding:"8px 14px",color:"#3B82F6",fontSize:12,fontWeight:600,cursor:"pointer",width:"100%",marginTop:6}}>+ Agregar cuadrilla</button>
        </RDCard>
      )}

      {/* Paso 3 */}
      {paso===3&&(
        <RDCard title="Actividades Realizadas" icon="✏️">
          {form.actividades.map((a,i)=>(
            <div key={i} style={{background:"#1a2235",borderRadius:16,padding:16,marginBottom:12,border:"1px solid #1e2d45"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:"#3B82F622",color:"#3B82F6"}}>Actividad {i+1}</span>
                <button onClick={()=>remAct(i)} style={{background:"none",border:"none",color:"#EF4444",fontSize:18,cursor:"pointer"}}>×</button>
              </div>
              <select value={a.partida} onChange={e=>setAct(i,"partida",e.target.value)} style={{width:"100%",padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",marginBottom:10}}>
                {PARTIDAS_RD.map(p=><option key={p} value={p} style={{background:"#111827"}}>{p}</option>)}
              </select>
              <textarea value={a.descripcion} rows={2} onChange={e=>setAct(i,"descripcion",e.target.value)} placeholder="¿Qué se hizo hoy en esta partida?"
                style={{width:"100%",padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",resize:"none",boxSizing:"border-box",marginBottom:12}}/>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <label style={{fontSize:11,fontWeight:600,color:"#8899BB",textTransform:"uppercase",letterSpacing:"0.5px"}}>% Avance hoy</label>
                <span style={{fontSize:14,fontWeight:800,color:"#3B82F6",fontFamily:"'Sora',sans-serif"}}>{a.avance}%</span>
              </div>
              <input type="range" min={0} max={100} value={a.avance} onChange={e=>setAct(i,"avance",+e.target.value)} style={{width:"100%",accentColor:"#3B82F6"}}/>
            </div>
          ))}
          <button onClick={addAct} style={{background:"none",border:"1px dashed #3B82F666",borderRadius:10,padding:"8px 14px",color:"#3B82F6",fontSize:12,fontWeight:600,cursor:"pointer",width:"100%"}}>+ Agregar actividad</button>
        </RDCard>
      )}

      {/* Paso 4 */}
      {paso===4&&(
        <div>
          <RDCard title="Materiales Utilizados" icon="📦">
            {form.materiales.map((m,i)=>(
              <div key={i} style={{background:"#1a2235",borderRadius:16,padding:16,marginBottom:12,border:"1px solid #1e2d45"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:"#F59E0B22",color:"#F59E0B"}}>Material {i+1}</span>
                  <button onClick={()=>remMat(i)} style={{background:"none",border:"none",color:"#EF4444",fontSize:18,cursor:"pointer"}}>×</button>
                </div>
                <input value={m.nombre} onChange={e=>setMat(i,"nombre",e.target.value)} placeholder="Nombre del material..."
                  style={{width:"100%",padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box",marginBottom:10}}/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
                  <input type="number" value={m.cantidad} onChange={e=>setMat(i,"cantidad",e.target.value)} placeholder="Cantidad"
                    style={{padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none"}}/>
                  <select value={m.unidad} onChange={e=>setMat(i,"unidad",e.target.value)} style={{padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none"}}>
                    {UNIDADES_RD.map(u=><option key={u} value={u} style={{background:"#111827"}}>{u}</option>)}
                  </select>
                </div>
                <input value={m.observacion} onChange={e=>setMat(i,"observacion",e.target.value)} placeholder="Observación (opcional)"
                  style={{width:"100%",padding:"10px 12px",background:"#0D1420",border:"1.5px solid #1e2d45",borderRadius:12,color:"#F0F4FF",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"}}/>
              </div>
            ))}
            <button onClick={addMat} style={{background:"none",border:"1px dashed #3B82F666",borderRadius:10,padding:"8px 14px",color:"#3B82F6",fontSize:12,fontWeight:600,cursor:"pointer",width:"100%"}}>+ Agregar material</button>
          </RDCard>
          <RDCard title="Equipos y Maquinaria" icon="🚧">
            <RDTextarea value={form.equipos} onChange={v=>setForm({...form,equipos:v})} placeholder="Ej: Grúa torre activa (8:00-17:00), Hormigonera en uso..." rows={3}/>
          </RDCard>
        </div>
      )}

      {/* Paso 5 */}
      {paso===5&&(
        <div>
          <RDCard title="Incidentes y Seguridad" icon="⚠️">
            <div style={{background:"#EF444408",border:"1px solid #EF444422",borderRadius:12,padding:12,marginBottom:12}}>
              <p style={{fontSize:12,color:"#EF4444",margin:0,fontWeight:600}}>Registra accidentes, cuasi-accidentes o situaciones de riesgo.</p>
            </div>
            <RDTextarea value={form.incidentes} onChange={v=>setForm({...form,incidentes:v})} placeholder="Si no hubo incidentes, escribe: Sin incidentes en el día" rows={3}/>
          </RDCard>
          <RDCard title="Observaciones Generales" icon="📝">
            <RDTextarea value={form.observaciones} onChange={v=>setForm({...form,observaciones:v})} placeholder="Visitas, problemas de diseño, instrucciones del mandante, coordinaciones pendientes..." rows={5}/>
          </RDCard>
          <RDCard title="Registro Fotográfico" icon="📸">
            <div style={{background:"#1a2235",border:"2px dashed #1e2d45",borderRadius:16,padding:28,textAlign:"center",cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#3B82F6"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="#1e2d45"}>
              <div style={{fontSize:32,marginBottom:10}}>📷</div>
              <p style={{fontSize:13,fontWeight:600,color:"#8899BB",margin:0}}>Subir fotos del avance</p>
              <p style={{fontSize:11,color:"#445566",margin:"6px 0 14px"}}>JPG, PNG · Máximo 20 fotos</p>
              <button style={{background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:10,padding:"9px 20px",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Seleccionar fotos</button>
            </div>
          </RDCard>
        </div>
      )}

      {/* Navegación */}
      <div style={{display:"flex",gap:12,marginTop:8}}>
        {paso>1&&<button onClick={()=>setPaso(paso-1)} style={{flex:1,padding:"13px",background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:14,color:t.textSub,fontSize:14,fontWeight:600,cursor:"pointer"}}>← Anterior</button>}
        <button onClick={()=>paso===5?setVista("resumen"):setPaso(paso+1)}
          style={{flex:2,padding:"13px",background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px #3B82F644"}}>
          {paso===5?"Revisar registro →":"Siguiente →"}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [darkMode,setDarkMode] = React.useState(false);
  const [loggedIn,setLoggedIn] = React.useState(false);
  const [view,setView] = React.useState("web");
  const t = themes[darkMode?"dark":"light"];
  const toggleDark = () => setDarkMode(d=>!d);

  if(!loggedIn) return <LoginScreen onLogin={()=>setLoggedIn(true)} t={t} darkMode={darkMode} toggleDark={toggleDark}/>;

  return (
    <div>
      <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",gap:6,background:darkMode?"rgba(10,14,26,0.9)":"rgba(255,255,255,0.9)",backdropFilter:"blur(12px)",borderRadius:14,padding:6,border:`1px solid ${t.border}`,boxShadow:t.shadow}}>
        {["web","mobile"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{padding:"6px 14px",borderRadius:10,fontSize:12,fontWeight:600,background:view===v?`linear-gradient(135deg,${t.blue},${t.blueDark})`:"transparent",border:"none",color:view===v?"#fff":t.textMuted,cursor:"pointer",transition:"all 0.2s"}}>
            {v==="web"?"🖥️ Web":"📱 Móvil"}
          </button>
        ))}
      </div>
      {view==="web"
        ?<DashboardWeb    t={t} darkMode={darkMode} toggleDark={toggleDark} onLogout={()=>setLoggedIn(false)}/>
        :<DashboardMobile t={t} darkMode={darkMode} toggleDark={toggleDark} onLogout={()=>setLoggedIn(false)}/>
      }
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
